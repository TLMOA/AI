[Service]
# Prefer NiFi DB for auth (set to 'local' to prefer local DB)
Environment=IOT_AUTH_DB=nifi

# Keep existing Python unbuffered env
Environment=PYTHONUNBUFFERED=1

# Notes: copy this file to /etc/systemd/system/iot-backend.service.d/override.conf
# then run: sudo systemctl daemon-reload && sudo systemctl restart iot-backend.service
