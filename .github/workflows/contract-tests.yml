name: Contract Tests

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install newman
        run: npm install -g newman

      - name: Run contract tests (Postman/Newman)
        run: |
          echo "Running contract tests against ${BASE_URL:-http://localhost:8081}"
          newman run contract-tests/postman_collection.json -e contract-tests/postman_env.json || exit 1
        env:
          BASE_URL: ${{ secrets.CONTRACT_BASE_URL }}
