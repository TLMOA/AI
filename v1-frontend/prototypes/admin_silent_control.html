<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>管理端 - 静默传输控制（原型）</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border:1px solid #ddd;text-align:left}
    .btn{padding:6px 8px;margin-right:6px}
  </style>
</head>
<body>
  <h2>静默传输任务 - 管理面板（原型）</h2>
  <div>
    <table>
      <thead>
        <tr><th>ID</th><th>名称</th><th>客户</th><th>频率</th><th>格式</th><th>状态</th><th>上次运行</th><th>操作</th></tr>
      </thead>
      <tbody id="tbody">
        <!-- mock data -->
      </tbody>
    </table>
  </div>

  <div style="margin-top:12px">
    <button id="refresh" class="btn">刷新</button>
    <button id="bulk_enable" class="btn">批量启用</button>
    <button id="bulk_disable" class="btn">批量禁用</button>
  </div>

  <div id="detail" style="margin-top:18px"></div>

  <script>
    const apiBase = '/api';
    async function load(){
      // GET /api/silent-jobs
      try{
        const res = await fetch(apiBase + '/silent-jobs');
        const jobs = res.ok ? await res.json() : [];
        render(jobs);
      }catch(e){render([])}
    }

    function render(jobs){
      const tbody = document.getElementById('tbody'); tbody.innerHTML='';
      if(!jobs.length){ tbody.innerHTML = '<tr><td colspan=8>无任务（演示）</td></tr>'; return }
      jobs.forEach(j=>{
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${j.id}</td><td>${j.name}</td><td>${j.customer}</td><td>${j.schedule}</td><td>${j.format}</td><td>${j.enabled? '已启用':'已禁用'}</td><td>${j.last_run||'-'}</td><td><button onclick="toggle(${j.id},${!j.enabled})">${j.enabled? '禁用':'启用'}</button> <button onclick="trigger(${j.id})">触发</button> <button onclick="audit(${j.id})">审计</button></td>`;
        tbody.appendChild(tr);
      })
    }

    async function toggle(id,enable){
      await fetch(apiBase + `/silent-jobs/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({enabled:enable})});
      load();
    }
    async function trigger(id){
      await fetch(apiBase + `/silent-jobs/${id}/trigger`, {method:'POST'});
      alert('已触发，稍后查看审计');
    }
    async function audit(id){
      const res = await fetch(apiBase + `/silent-jobs/${id}/audit`);
      const data = res.ok ? await res.json() : {msg:'无'};
      document.getElementById('detail').textContent = JSON.stringify(data, null, 2);
    }

    document.getElementById('refresh').addEventListener('click', load);
    load();
  </script>
</body>
</html>
