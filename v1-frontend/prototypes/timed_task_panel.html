<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>定时转换 - 原型</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;padding:20px}
    .panel{max-width:720px;border:1px solid #ddd;padding:16px;border-radius:6px}
    label{display:block;margin-top:8px}
    input,select{padding:6px;width:100%;box-sizing:border-box}
    .row{display:flex;gap:8px}
    .row > *{flex:1}
    .actions{margin-top:12px}
    button{padding:8px 12px}
  </style>
</head>
<body>
  <h2>定时自动转换（原型）</h2>
  <div class="panel">
    <label>任务名称
      <input id="name" placeholder="例如：每日导出客户A" />
    </label>

    <div class="row">
      <label>频率
        <select id="frequency">
          <option value="5m">每5分钟</option>
          <option value="15m">每15分钟</option>
          <option value="1h">每小时</option>
          <option value="daily">每日</option>
          <option value="cron">自定义 cron（下方输入）</option>
        </select>
      </label>
      <label>格式
        <select id="format">
          <option value="csv">CSV</option>
          <option value="json">JSON</option>
          <option value="tsv">TSV</option>
        </select>
      </label>
    </div>

    <label>自定义 cron（可选）
      <input id="cron" placeholder="例如：0 2 * * * （每天凌晨2点）" />
    </label>

    <label>保存位置
      <select id="destination">
        <option value="local">本地（nifi_data）</option>
        <option value="s3">对象存储（S3）</option>
        <option value="sftp">SFTP</option>
      </select>
    </label>

    <label>启用任务
      <select id="enabled">
        <option value="true">启用</option>
        <option value="false">禁用</option>
      </select>
    </label>

    <div class="actions">
      <button id="save">保存任务</button>
      <button id="trigger">手动触发</button>
    </div>

    <div id="msg" style="margin-top:12px;color:#666"></div>
  </div>

  <script>
    const apiBase = '/api'; // 与后端约定前缀

    document.getElementById('save').addEventListener('click', async ()=>{
      const payload = collect();
      const res = await fetch(apiBase + '/export-jobs', {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
      });
      document.getElementById('msg').textContent = res.ok ? '任务已保存' : '保存失败';
    });

    document.getElementById('trigger').addEventListener('click', async ()=>{
      const payload = collect();
      // 临时创建并触发，或调用 existing job trigger
      const res = await fetch(apiBase + '/export-jobs/trigger', {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
      });
      document.getElementById('msg').textContent = res.ok ? '触发成功' : '触发失败';
    });

    function collect(){
      return {
        name: document.getElementById('name').value,
        schedule: document.getElementById('frequency').value === 'cron' ? document.getElementById('cron').value : document.getElementById('frequency').value,
        format: document.getElementById('format').value,
        destination: document.getElementById('destination').value,
        enabled: document.getElementById('enabled').value === 'true'
      };
    }
  </script>
</body>
</html>
